<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Rides - Traventure</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .map-container {
            height: 400px;
            width: 100%;
            background-color: #1e293b;
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .map-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .ride-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.6);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-fast);
        }

        .ride-option:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: var(--color-accent);
        }

        .ride-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .ride-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--color-accent);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="container" style="padding-top: 2rem;">
        <div class="flex-between" style="margin-bottom: 2rem;">
            <a href="home.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <h2>Local City Travel</h2>
            <div style="width: 80px;"></div> <!-- Spacer -->
        </div>

        <div class="grid-cols-2" style="grid-template-columns: 1.5fr 1fr; align-items: start;">
            <!-- Map View -->
            <div>
                <div class="map-container">
                    <!-- Static Map Image for Demo -->
                    <img src="https://static.vecteezy.com/system/resources/previews/000/171/283/original/vector-city-map.jpg"
                        class="map-placeholder" alt="Map">
                    <div
                        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--color-accent); padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; box-shadow: 0 0 20px rgba(249,115,22,0.6);">
                        <i class="fa-solid fa-location-dot"></i> You are here
                    </div>
                </div>

                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3>Trip Details</h3>
                    <div style="margin-top: 1rem;">
                        <input type="text" class="input-field" value="Current Location" style="margin-bottom: 0.5rem;"
                            readonly>
                        <input type="text" class="input-field" placeholder="Where to? (e.g. City Mall)"
                            style="margin-bottom: 1rem;">
                    </div>
                </div>
            </div>

            <!-- Ride Options -->
            <div class="glass-panel" style="padding: 1.5rem; height: 100%;">
                <h3 style="margin-bottom: 1.5rem;">Select Your Ride</h3>

                <!-- Cab -->
                <div class="ride-option">
                    <div class="ride-info">
                        <div class="ride-icon"><i class="fa-solid fa-car"></i></div>
                        <div>
                            <h4>Prime Sedan</h4>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">4 seats • AC • Wifi</p>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <h4 style="color: var(--color-accent);">₹340</h4>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">5 min away</p>
                    </div>
                </div>

                <!-- Bike -->
                <div class="ride-option">
                    <div class="ride-info">
                        <div class="ride-icon"><i class="fa-solid fa-motorcycle"></i></div>
                        <div>
                            <h4>Rapido Bike</h4>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">1 seat • Fastest</p>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <h4 style="color: var(--color-accent);">₹120</h4>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">2 min away</p>
                    </div>
                </div>

                <!-- Auto -->
                <div class="ride-option">
                    <div class="ride-info">
                        <div class="ride-icon"><i class="fa-solid fa-taxi"></i></div>
                        <div>
                            <h4>Auto Rickshaw</h4>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">3 seats • Economical</p>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <h4 style="color: var(--color-accent);">₹190</h4>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">4 min away</p>
                    </div>
                </div>

                <a href="payment.html" class="btn btn-primary"
                    style="width: 100%; margin-top: 1rem; text-align: center;">Book Now</a>
            </div>
        </div>
    </div>

    <script src="js/auth-lib.js"></script>
    <script>
        auth.requireAuth();
    </script>
</body>

</html>
